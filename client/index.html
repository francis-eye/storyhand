  <body>
    <script>
      (function() {
        var mode = localStorage.getItem('storyhand-color-mode');
        var isDark = mode === 'dark' ||
          (mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <noscript>
      <div style="font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1.5rem; line-height: 1.6;">
        <h1>Storyhand</h1>
        <p><strong>Real-time planning poker for distributed teams.</strong></p>
        <p>Storyhand is a no-signup, browser-based planning poker tool for agile teams. A host creates an estimation session, shares a Session ID, and team members vote on story points using a Fibonacci card deck. Votes are hidden until the host reveals them simultaneously.</p>
        <p>This site requires JavaScript to run. Please enable JavaScript and reload, or visit on a modern browser.</p>
        <p><a href="https://github.com/francis-eye/storyhand">Source code on GitHub</a> · <a href="/privacy">Privacy policy</a></p>
